<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="iconbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#d8d8d8"/>
    </linearGradient>
    <!-- Embossed C glyph (same as the site's hero icon). -->
    <filter id="emboss" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6" result="offset"/>
      <feComposite in="SourceAlpha" in2="offset" operator="arithmetic" k2="-1" k3="1" result="inner"/>
      <feFlood flood-color="#000" flood-opacity="0.35"/>
      <feComposite in2="inner" operator="in"/>
      <feComposite in="SourceGraphic" operator="over"/>
    </filter>
    <!-- Soft elevation shadow for the squircle. -->
    <filter id="iconshadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="16" stdDeviation="17" flood-color="#000" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#fafafa"/>

  <!-- App icon: the 1024 hero icon scaled to 190px, centered, with a drop shadow. -->
  <g filter="url(#iconshadow)">
    <g transform="translate(505 116) scale(0.185547)">
      <rect width="1024" height="1024" rx="229" ry="229" fill="url(#iconbg)"/>
      <g filter="url(#emboss)">
        <path transform="translate(140 130) scale(5.24)" fill="#1c1c1c" fill-opacity="0.92"
          d="M73.5514 148.102C29.4879 148.102 -2.13166 112.607 0.112314 70.9911C2.15229 31.8236 34.5879 0 74.7754 0C91.5031 0 103.335 5.91592 114.351 5.91592C118.431 5.91592 124.347 5.09994 126.387 1.42799L129.243 1.22399L133.119 60.1792L130.263 60.5872C124.143 35.9035 102.315 3.67195 74.9794 3.67195C55.1916 3.67195 34.5879 22.6437 34.3839 55.4873C34.1799 92.2068 60.2915 118.93 92.3191 118.93C113.739 118.93 130.263 106.895 136.995 89.9629L139.443 90.5748C134.751 124.642 109.047 148.102 73.5514 148.102Z"/>
      </g>
    </g>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Helvetica, Arial, sans-serif" text-anchor="middle">
    <text x="600" y="430" font-size="84" font-weight="700" letter-spacing="-2.5" fill="#1c1c1c">Colophon</text>
    <text x="600" y="512" font-size="30" font-weight="400" fill="#6a6a6a">A calm, content-first RSS and newsletter reader for iPhone and iPad.</text>
  </g>
</svg>
